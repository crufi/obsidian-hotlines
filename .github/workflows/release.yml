name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Attest release files
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" main.js manifest.json \
            --title "$GITHUB_REF_NAME" --draft --generate-notes
